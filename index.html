<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Student Registration Dashboard</h1>
    </header>
    <main>
        <div id="parent">
            <form id="student-form">
                <div class="input-container child">
                    <input type="text" id="name" required="">
                    <label for="input" class="label">Student's Name</label>
                    <div class="underline"></div>
                </div>
                  
                <div class="input-container child">
                    <input type="number" id="age" required="">
                    <label for="input" class="label">Student's Age</label>
                    <div class="underline"></div>
                </div>
                  
                <div class="input-container child">
                    <input type="text" id="grade" required="">
                    <label for="input" class="label">Student's Grade</label>
                    <div class="underline"></div>
                </div>
                  
                <div class="input-container child">
                    <input type="email" id="email" required="">
                    <label for="input" class="label">Student's Email</label>
                    <div class="underline"></div>
                </div>
                  
                <div class="child" style="flex: 8%; padding-top: 40px; padding-left: 10px;">
                    
                    <button type="submit" id="submit-button">Add Student</button>
                </div>
                
            </form>
        </div>
        <section id="student-list-section">
            <h2>Registered Students</h2>
            <table id="student-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Grade</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </section>
    </main>
    
   
</body>
<script src="script.js"></script>
</html>
